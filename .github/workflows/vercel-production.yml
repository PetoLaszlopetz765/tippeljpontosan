name: Vercel Production Deploy

on:
  push:
    branches:
      - master

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: petz765s-projects
      VERCEL_PROJECT: tippeljpontosan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --scope=$VERCEL_SCOPE --project=$VERCEL_PROJECT --token=$VERCEL_TOKEN

      - name: Build project artifacts
        run: npx vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to production
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
